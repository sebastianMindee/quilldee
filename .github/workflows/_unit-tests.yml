name: Unit tests

on:
  workflow_call:

jobs:
  unit-tests:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85"]

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP dev headers
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y php-dev libclang-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run workspace tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo nextest run --workspace --all-features --no-tests=pass

      - name: Run core tests
        if: matrix.os != 'ubuntu-latest'
        run: cargo nextest run -p bernard-ledit --all-features --no-tests=pass
